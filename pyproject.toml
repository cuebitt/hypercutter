[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hypercutter"
version = "0.2.1"
description = "GBA Pokemon ROM data extraction tool"
requires-python = ">=3.10"
dependencies = ["Pillow", "tqdm"]

[project.optional-dependencies]
docs = ["sphinx", "sphinx-rtd-theme"]
lint = ["ruff"]
test = ["pytest"]

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.format]
quote-style = "double"

[project.scripts]
hypercutter = "cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["hypercutter", "cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
