[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hypercutter"
version = "0.1.3"
description = "Pokemon Emerald image ripper - rips tilesets and sprites"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
hypercutter = "cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["hypercutter", "cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
