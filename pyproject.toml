[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hypercutter"
version = "0.2.0"
description = "GBA Pokemon ROM data extraction tool"
requires-python = ">=3.10"
dependencies = ["Pillow"]

[project.scripts]
hypercutter = "cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["hypercutter", "cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
