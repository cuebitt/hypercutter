name: Publish WASM to npm

on:
  push:
    tags:
      - "v[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Run sccache-cache
        uses: Mozilla-Actions/sccache-action@v0.0.10
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "0.15.0"
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Build WASM package
        run: wasm-pack build --release --target bundler
      - name: Patch package.json for modern exports
        run: |
          node -e '
            const pkg = require("./pkg/package.json");
            pkg.module = "hypercutter.js";
            pkg.exports = { ".": { "import": "./hypercutter.js", "types": "./hypercutter.d.ts" } };
            require("fs").writeFileSync("./pkg/package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
      - name: Publish to npm
        run: pnpm publish --provenance --no-git-checks --access public
        working-directory: pkg
