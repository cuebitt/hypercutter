<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Data - Metatile Extractor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>
    <header class="container">
        <hgroup>
            <h1>Hypercutter</h1>
            <h2>Extract Metatiles from a Pokemon Emerald ROM!</h2>
        </hgroup>
    </header>

    <main class="container">
        <article style="max-width: 520px; margin: auto;">
            <header>Extract Metatile Info</header>
            <form id="metatile-info-form">
                <fieldset>
                    <label for="sym-file">
                        Symbol File (.sym)
                        <input type="file" id="sym-file" accept=".sym" required>
                    </label>

                    <label for="rom-file">
                        ROM File (.gba)
                        <input type="file" id="rom-file" accept=".gba" required>
                    </label>
                </fieldset>
                <input type="submit" value="Extract Metatiles" id="submit-metatile-info-btn" disabled>
            </form>
        </article>

        <article id="status-article" style="display: none; margin-top: 1rem;">
            <header id="status"></header>
            <pre id="output"></pre>
        </article>
    </main>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script src="pyodide_runner.js"></script>
</body>

</html>
