<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Data - Metatile Extractor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>
    <header class="container">
        <hgroup>
            <h1>Hypercutter</h1>
            <h2>Extract Metatiles from a Pokemon Emerald ROM!</h2>
        </hgroup>
    </header>

    <main class="container">
        <div class="grid">
            <article>
                <header>Extract Metadata (JSON)</header>
                <form id="json-form">
                    <fieldset>
                        <label for="sym-file-json">
                            Symbol File (.sym)
                            <input type="file" id="sym-file-json" accept=".sym" required>
                        </label>
                        <label for="rom-file-json">
                            ROM File (.gba)
                            <input type="file" id="rom-file-json" accept=".gba" required>
                        </label>
                    </fieldset>
                    <input type="submit" value="Extract JSON" id="json-btn" disabled>
                </form>
            </article>

            <article>
                <header>Extract Images (PNG)</header>
                <form id="png-form">
                    <fieldset>
                        <label for="json-file-png">
                            Metatiles JSON (from Metadata step)
                            <input type="file" id="json-file-png" accept=".json" required>
                        </label>
                        <label for="rom-file-png">
                            ROM File (.gba)
                            <input type="file" id="rom-file-png" accept=".gba" required>
                        </label>
                    </fieldset>
                    <input type="submit" value="Extract PNGs" id="png-btn" disabled>
                </form>
            </article>
        </div>

        <article id="status-article" style="display: none; margin-top: 1rem;">
            <header id="status"></header>
            <pre id="output"></pre>
        </article>
    </main>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
    <script src="pyodide_runner.js"></script>
</body>

</html>
